<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chara Choice</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        /* Эффект тряски экрана */
        .shake-screen {
            animation: shake 0.1s infinite;
        }

        /* Эффект бешеного мигания */
        .flash-red {
            animation: flash 0.15s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes flash {
            0% { background-color: red; }
            50% { background-color: black; }
            100% { background-color: darkred; }
        }

        .character-container {
            cursor: pointer;
            margin-bottom: 30px;
            padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        img {
            image-rendering: pixelated;
            width: 140px;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .textbox {
            width: 85%;
            max-width: 500px;
            min-height: 120px;
            border: 4px solid white;
            background-color: black;
            padding: 15px;
            box-sizing: border-box;
            display: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .text-content {
            color: white;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.4;
            margin: 0;
            white-space: pre-wrap;
        }

        .choices-container {
            display: none;
            justify-content: space-around;
            width: 85%;
            max-width: 500px;
            margin-top: 20px;
        }

        .choice-btn {
            background-color: black;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:hover, .choice-btn:active {
            color: #ff9d00;
            border-color: #ff9d00;
        }
    </style>
</head>
<body>

    <div class="character-container" id="charaDiv" onclick="handleCharaClick()">
        <img src="Chara.png" alt="Chara">
    </div>

    <div class="textbox" id="dialogBox" onclick="advanceDialog()">
        <p class="text-content" id="dialogText"></p>
    </div>

    <div class="choices-container" id="choicesBox">
        <button class="choice-btn" onclick="makeChoice('erase')">[ СТЕРЕТЬ ]</button>
        <button class="choice-btn" onclick="makeChoice('do_not')">[ НЕ СТЕРЕТЬ ]</button>
    </div>

    <script>
        // Загружаем оригинальный жуткий гул Чары
        const screamSound = new Audio("https://soundboard.com");
        screamSound.preload = "auto"; // Заставляем телефон скачать звук заранее

        const phrases = [
            "* Приветствую.",
            "* Я Чара.",
            "* Спасибо тебе.",
            "* Твоя сила пробудила меня от смерти.",
            "* Давай сотрем этот бесполезный мир..."
        ];

        let currentLine = 0;
        let isTyping = false;
        let typingTimeout;
        let dialogStarted = false;
        let isChoicePhase = false;

        const dialogBox = document.getElementById('dialogBox');
        const dialogText = document.getElementById('dialogText');
        const choicesBox = document.getElementById('choicesBox');
        const charaDiv = document.getElementById('charaDiv');

        function typeText(text, index = 0, callback = null) {
            if (index < text.length) {
                isTyping = true;
                dialogText.textContent += text[index];
                typingTimeout = setTimeout(() => typeText(text, index + 1, callback), 40);
            } else {
                isTyping = false;
                if (callback) callback();
            }
        }

        function handleCharaClick() {
            if (isChoicePhase) return;
            
            if (!dialogStarted) {
                dialogStarted = true;
                dialogBox.style.display = "block";
                choicesBox.style.display = "none";
                dialogText.textContent = "";
                currentLine = 0;
                typeText(phrases);
            } else {
                advanceDialog();
            }
        }

        function advanceDialog() {
            if (isChoicePhase) return;

            if (isTyping) {
                clearTimeout(typingTimeout);
                dialogText.textContent = phrases[currentLine];
                isTyping = false;
                if (currentLine === phrases.length - 1) showChoices();
                return;
            }

            currentLine++;

            if (currentLine < phrases.length) {
                dialogText.textContent = "";
                typeText(phrases[currentLine], 0, () => {
                    if (currentLine === phrases.length - 1) showChoices();
                });
            }
        }

        function showChoices() {
            isChoicePhase = true;
            choicesBox.style.display = "flex";
        }

        function triggerScreamer() {
            // Включаем звук сразу от клика пользователя, чтобы обойти защиту телефона
            screamSound.play().catch(e => console.log("Ошибка звука:", e));

            // Скрываем элементы интерфейса
            dialogBox.style.display = "none";
            choicesBox.style.display = "none";

            // Запускаем безумную тряску и мигание всего экрана
            document.body.classList.add("flash-red");
            document.body.classList.add("shake-screen");

            // Ровно через 3 секунды кошмар прекращается и игра сбрасывается
            setTimeout(() => {
                document.body.classList.remove("flash-red");
                document.body.classList.remove("shake-screen");
                document.body.style.backgroundColor = "black";
                resetGame();
            }, 3000);
        }

        function makeChoice(answer) {
            choicesBox.style.display = "none";
            dialogText.textContent = "";

            if (answer === 'erase') {
                typeText("* Именно. Ты отличный партнер.", 0, () => {
                    setTimeout(triggerScreamer, 1000);
                });
            } else {
                typeText("* Нет?...", 0, () => {
                    setTimeout(() => {
                        dialogText.textContent = "";
                        typeText("* С каких это пор ты здесь главный?", 0, () => {
                            setTimeout(triggerScreamer, 800);
                        });
                    }, 1200);
                });
            }
        }

        function resetGame() {
            currentLine = 0;
            isTyping = false;
            dialogStarted = false;
            isChoicePhase = false;
            dialogBox.style.display = "none";
            choicesBox.style.display = "none";
        }
    </script>
</body>
</html>
